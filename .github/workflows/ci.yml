name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-lint-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-format \
            clang-tidy \
            cmake \
            ninja-build \
            protobuf-compiler \
            libprotobuf-dev \
            protobuf-compiler-grpc \
            libgrpc++-dev

      - name: Enforce C++ file extensions
        run: |
          if git ls-files '*.cc' | grep -q .; then
            echo 'Found forbidden .cc files. Use .cpp instead.' >&2
            git ls-files '*.cc'
            exit 1
          fi

      - name: Verify formatting
        run: |
          mapfile -t CPP_FILES < <(git ls-files '*.h' '*.hpp' '*.c' '*.cpp')
          if [ "${#CPP_FILES[@]}" -gt 0 ]; then
            clang-format --dry-run --Werror "${CPP_FILES[@]}"
          fi

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Generate protobuf/gRPC sources
        run: cmake --build build --target a2a_proto_codegen --parallel

      - name: Verify generation is up-to-date
        run: git diff --exit-code

      - name: Build
        run: cmake --build build --parallel

      - name: Lint (clang-tidy)
        run: ./scripts/run_clang_tidy.sh build

      - name: Unit and integration tests
        run: ctest --test-dir build --output-on-failure

      - name: Functional tests (HTTP+JSON transport)
        run: ctest --test-dir build --output-on-failure -R 'HttpJsonClientIntegrationTest\..*'

  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            ninja-build \
            protobuf-compiler \
            libprotobuf-dev \
            protobuf-compiler-grpc \
            libgrpc++-dev

      - name: Configure (ASan/UBSan)
        run: |
          cmake -S . -B build-asan -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' \
            -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined' \
            -DCMAKE_SHARED_LINKER_FLAGS='-fsanitize=address,undefined'

      - name: Build
        run: cmake --build build-asan --parallel

      - name: Run representative integration tests
        run: ctest --test-dir build-asan --output-on-failure -R 'ExamplesInteropIntegrationTest\..*'
