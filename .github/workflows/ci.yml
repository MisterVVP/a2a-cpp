name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-lint-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format clang-tidy cmake ninja-build protobuf-compiler libprotobuf-dev protobuf-compiler-grpc libgrpc++-dev python3-pip
          python3 -m pip install --upgrade gcovr
      - name: Verify changes
        run: ./scripts/verify_changes.sh

  examples-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build protobuf-compiler libprotobuf-dev protobuf-compiler-grpc libgrpc++-dev
      - name: Run examples smoke
        run: ./scripts/run_examples.sh build-examples

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build protobuf-compiler libprotobuf-dev protobuf-compiler-grpc libgrpc++-dev python3-pip
          python3 -m pip install --upgrade gcovr
      - name: Coverage gate
        run: ./scripts/run_coverage.sh
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build-coverage/coverage

  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang cmake ninja-build protobuf-compiler libprotobuf-dev protobuf-compiler-grpc libgrpc++-dev
      - name: Configure and test ASan/UBSan
        run: |
          cmake -S . -B build-asan -G Ninja -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined' -DCMAKE_SHARED_LINKER_FLAGS='-fsanitize=address,undefined'
          cmake --build build-asan --parallel
          ctest --test-dir build-asan --output-on-failure -R 'ExamplesInteropIntegrationTest\..*'

  macos-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - run: |
          brew install cmake ninja protobuf grpc
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build --parallel

  windows-build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - name: Setup vcpkg deps
        run: |
          vcpkg install protobuf grpc
      - name: Configure and build
        shell: pwsh
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build --parallel
