// A2A v1.0 protocol definition.
// Source: https://a2a-protocol.org/latest/definitions/
// NOTE: This repository currently vendors the protocol subset required for
// bootstrap/codegen smoke testing.
syntax = "proto3";

package lf.a2a.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Lf.A2a.V1";
option go_package = "google.golang.org/lf/a2a/v1";
option java_multiple_files = true;
option java_outer_classname = "A2A";
option java_package = "com.google.lf.a2a.v1";

service A2AService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc SendStreamingMessage(SendMessageRequest) returns (stream StreamResponse);
  rpc GetTask(GetTaskRequest) returns (Task);
  rpc CancelTask(CancelTaskRequest) returns (Task);
  rpc SetTaskPushNotificationConfig(TaskPushNotificationConfig)
      returns (TaskPushNotificationConfig);
  rpc GetTaskPushNotificationConfig(GetTaskPushNotificationConfigRequest)
      returns (TaskPushNotificationConfig);
  rpc ListTaskPushNotificationConfigs(ListTaskPushNotificationConfigsRequest)
      returns (ListTaskPushNotificationConfigsResponse);
  rpc DeleteTaskPushNotificationConfig(DeleteTaskPushNotificationConfigRequest)
      returns (google.protobuf.Empty);
}

message SendMessageRequest {
  Message message = 1;
  SendMessageConfiguration configuration = 2;
  Metadata metadata = 3;
}

message SendMessageResponse {
  oneof result {
    Task task = 1;
    Message message = 2;
  }
}

message StreamResponse {
  oneof payload {
    Task task = 1;
    Message message = 2;
    TaskStatusUpdateEvent status_update = 3;
    TaskArtifactUpdateEvent artifact_update = 4;
  }
}

message GetTaskRequest {
  string id = 1;
  string history_length = 2;
  Metadata metadata = 3;
}

message CancelTaskRequest {
  string id = 1;
  Metadata metadata = 2;
}

message GetTaskPushNotificationConfigRequest {
  string id = 1;
  Metadata metadata = 2;
}

message ListTaskPushNotificationConfigsRequest {
  string task_id = 1;
  int32 page_size = 2;
  string page_token = 3;
  Metadata metadata = 4;
}

message DeleteTaskPushNotificationConfigRequest {
  string id = 1;
  Metadata metadata = 2;
}

message ListTaskPushNotificationConfigsResponse {
  repeated TaskPushNotificationConfig configs = 1;
  string next_page_token = 2;
}

message SendMessageConfiguration {
  bool accepted_output_modes_only = 1;
  repeated string push_notification_ids = 2;
}

message Message {
  string role = 1;
  repeated Part parts = 2;
  string message_id = 3;
  string task_id = 4;
  string context_id = 5;
  google.protobuf.Timestamp created_at = 6;
  Metadata metadata = 7;
}

message Part {
  oneof kind {
    TextPart text = 1;
    FilePart file = 2;
    DataPart data = 3;
  }
}

message TextPart {
  string text = 1;
}

message FilePart {
  oneof source {
    string file_with_uri = 1;
    bytes file_with_bytes = 2;
  }
  Metadata metadata = 3;
}

message DataPart {
  google.protobuf.Struct data = 1;
}

message Task {
  string id = 1;
  string context_id = 2;
  TaskStatus status = 3;
  repeated Artifact artifacts = 4;
  repeated Message history = 5;
  Metadata metadata = 6;
}

message TaskStatus {
  TaskState state = 1;
  Message message = 2;
  google.protobuf.Timestamp timestamp = 3;
}

enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_SUBMITTED = 1;
  TASK_STATE_WORKING = 2;
  TASK_STATE_INPUT_REQUIRED = 3;
  TASK_STATE_COMPLETED = 4;
  TASK_STATE_CANCELED = 5;
  TASK_STATE_FAILED = 6;
}

message Artifact {
  string artifact_id = 1;
  string name = 2;
  repeated Part parts = 3;
  bool append = 4;
  Metadata metadata = 5;
}

message TaskStatusUpdateEvent {
  string task_id = 1;
  TaskStatus status = 2;
  bool final = 3;
  Metadata metadata = 4;
}

message TaskArtifactUpdateEvent {
  string task_id = 1;
  Artifact artifact = 2;
  Metadata metadata = 3;
}

message TaskPushNotificationConfig {
  string id = 1;
  string task_id = 2;
  string endpoint = 3;
  Metadata metadata = 4;
}

message Metadata {
  google.protobuf.Struct entries = 1;
}

enum TransportProtocol {
  TRANSPORT_PROTOCOL_UNSPECIFIED = 0;
  TRANSPORT_PROTOCOL_REST = 1;
  TRANSPORT_PROTOCOL_JSON_RPC = 2;
  TRANSPORT_PROTOCOL_GRPC = 3;
}

message SecurityScheme {
  string type = 1;
  string scheme = 2;
  string bearer_format = 3;
  string open_id_connect_url = 4;
  string description = 5;
}

message AgentInterface {
  TransportProtocol transport = 1;
  string url = 2;
  repeated string security_requirements = 3;
}

message AgentCard {
  string protocol_version = 1;
  string name = 2;
  repeated AgentInterface supported_interfaces = 3;
  map<string, SecurityScheme> security_schemes = 4;
  repeated string default_security_requirements = 5;
}
